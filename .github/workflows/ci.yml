name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: typecheck + lint + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      # No --passWithNoTests anywhere: an empty suite fails (docs/TESTING.md).
      - run: pnpm -r test

  integration:
    name: integration (Testcontainers) + build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Real Elasticsearch + Postgres containers on the runner's Docker.
      - run: pnpm -r test:integration
      - run: pnpm -r build
